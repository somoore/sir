name: Performance Guardrails

on:
  pull_request:
    paths:
      - 'cmd/sir/**'
      - 'pkg/**'
      - 'bench/**'
      - 'scripts/check_bench_budget.py'
      - 'Makefile'
      - '.github/workflows/perf-guardrails.yml'
  push:
    branches:
      - main
    paths:
      - 'cmd/sir/**'
      - 'pkg/**'
      - 'bench/**'
      - 'scripts/check_bench_budget.py'
      - 'Makefile'
      - '.github/workflows/perf-guardrails.yml'
  merge_group:
    types: [checks_requested]

permissions: {}

concurrency:
  group: perf-guardrails-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-budgets:
    name: Benchmark budgets
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.11"
          cache: false

      - name: Enforce benchmark budgets
        run: make bench-check
