name: Performance Guardrails

on:
  pull_request:
    paths:
      - 'cmd/sir/**'
      - 'pkg/**'
      - 'bench/**'
      - 'scripts/check_bench_budget.py'
      - 'Makefile'
      - '.github/workflows/perf-guardrails.yml'
  push:
    branches:
      - main
    paths:
      - 'cmd/sir/**'
      - 'pkg/**'
      - 'bench/**'
      - 'scripts/check_bench_budget.py'
      - 'Makefile'
      - '.github/workflows/perf-guardrails.yml'
  merge_group:
    types: [checks_requested]

permissions: {}

concurrency:
  group: perf-guardrails-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-budgets:
    name: Benchmark budgets
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
          cache: false

      - name: Enforce benchmark budgets
        run: make bench-check
