name: CodeQL

# GitHub first-party static analysis (SAST) for the sir Go CLI.
# Runs on every pull_request, every push to main, and weekly so code
# scanning stays fresh in quiet weeks. Check-runs attach to each
# commit and PR, which is what OpenSSF Scorecard SAST walks for known
# GitHub apps like CodeQL (github-code-scanning).
#
# CodeQL for Rust is still in technical preview and not worth wiring
# up yet. Rust analysis happens via cargo-deny plus clippy with
# -D warnings in ci.yml, which serves the same purpose.

permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 5 * * 2'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.11"
  CGO_ENABLED: "0"
  GOFLAGS: "-trimpath"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.11"
          cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: go
          queries: security-and-quality

      - name: Build sir
        run: |
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w" \
            -o bin/sir \
            ./cmd/sir

      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:go
