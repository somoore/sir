name: CodeQL

# GitHub first-party static analysis (SAST) for the sir Go CLI.
# Runs on every pull_request, every push to main, and weekly so code
# scanning stays fresh in quiet weeks. Check-runs attach to each
# commit and PR, which is what OpenSSF Scorecard SAST walks for known
# GitHub apps like CodeQL (github-code-scanning).
#
# CodeQL for Rust is still in technical preview and not worth wiring
# up yet. Rust analysis happens via cargo-deny plus clippy with
# -D warnings in ci.yml, which serves the same purpose.

permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 5 * * 2'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.9"
  CGO_ENABLED: "0"
  GOFLAGS: "-trimpath"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
          cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: go
          queries: security-and-quality

      - name: Build sir
        run: |
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w" \
            -o bin/sir \
            ./cmd/sir

      - name: Analyze
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: /language:go
