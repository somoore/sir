name: Packaging

# Packaging sanity check via goreleaser in snapshot mode.
#
# This workflow does NOT publish anything. The published sir release
# pipeline lives in release.yml. This workflow exists so the repo has
# a working goreleaser path that lints .goreleaser.yml on every PR and
# push to main, builds a snapshot to catch config regressions early,
# and satisfies OpenSSF Scorecard Packaging (which credits projects
# using goreleaser-action in a workflow file).

permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: packaging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.9"
  CGO_ENABLED: "0"
  GOFLAGS: "-trimpath"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  goreleaser-snapshot:
    name: goreleaser snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
          cache: false

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish
