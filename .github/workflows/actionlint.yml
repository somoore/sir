name: actionlint

# Re-registered after harden-runner cleanup on 2026-04-07.
# actionlint: syntactic + semantic linter for GitHub Actions workflows.
# Catches invalid expressions, missing shells, unused env vars, broken
# matrix references, shellcheck violations inside `run:` blocks, and
# other workflow-authoring mistakes. Complement to zizmor (which focuses
# on security posture).
#
# Binary is installed via pinned version with sha256 verification.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'scripts/check_workflow_policy.rb'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'scripts/check_workflow_policy.rb'
  merge_group:
    types: [checks_requested]

permissions: {}

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Pinned version with sha256 check. Bump both values together.
      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          set -euo pipefail
          curl -fsSLO \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" | sha256sum --check
          tar -xzf "actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" actionlint
          sudo mv actionlint /usr/local/bin/actionlint
          actionlint -version

      - name: Run actionlint
        run: |
          actionlint -color

      - name: Ban privileged workflow triggers
        run: |
          ruby scripts/check_workflow_policy.rb
