<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!--
    sir Social Preview — GitHub repository card
    1280x640 as recommended by GitHub
    Design: Paper MCP principles — clean, content-first, semantic color
  -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background: Paper dark surface -->
  <rect width="1280" height="640" fill="#0A0A0A"/>

  <!-- Subtle grid pattern (Paper's web-foundation aesthetic) -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A1A" stroke-width="0.5"/>
  </pattern>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Inverted shield logo — centered upper area -->
  <g transform="translate(590, 100) scale(2.5)">
    <!-- Shield outline (inverted, points down) -->
    <path d="
      M 20 48
      C 20 48, 0 34, 0 16
      L 0 0
      L 40 0
      L 40 16
      C 40 34, 20 48, 20 48
      Z
      M 4 4
      L 4 16
      C 4 31, 20 43, 20 43
      C 20 43, 36 31, 36 16
      L 36 4
      Z
    " fill="#F5F3EE" fill-rule="evenodd"/>
    <!-- Upward arrow -->
    <polygon points="20,-6 28,6 24,6 24,26 16,26 16,6 12,6" fill="#F5F3EE"/>
  </g>

  <!-- Title: sir -->
  <text x="640" y="340" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-weight="700" font-size="72" fill="#F5F3EE" letter-spacing="12">sir</text>

  <!-- Tagline -->
  <text x="640" y="400" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-weight="400" font-size="28" fill="#9CA3AF" letter-spacing="4">SANDBOX IN REVERSE</text>

  <!-- Subtitle -->
  <text x="640" y="455" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-weight="400" font-size="20" fill="#6B7280">Security runtime for AI coding agents</text>

  <!-- Bottom accent line — using verdict colors -->
  <rect x="440" y="520" width="100" height="3" rx="1.5" fill="#16A34A"/>
  <rect x="550" y="520" width="100" height="3" rx="1.5" fill="#D97706"/>
  <rect x="660" y="520" width="100" height="3" rx="1.5" fill="#DC2626"/>

  <!-- Bottom labels for the accent colors -->
  <text x="490" y="548" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="400" font-size="11" fill="#4B5563">allow</text>
  <text x="600" y="548" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="400" font-size="11" fill="#4B5563">ask</text>
  <text x="710" y="548" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="400" font-size="11" fill="#4B5563">block</text>
</svg>
