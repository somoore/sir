<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!--
    sir social preview — 1280 × 640
    Design system: assets/design-system.html § 7.2
    Dark graphite background, newspaper masthead, brackets mark, IBM Plex type.
  -->
  <defs>
    <pattern id="grain" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#0A0A08"/>
      <circle cx="1" cy="1" r="0.3" fill="#1E1D1A"/>
      <circle cx="3" cy="3" r="0.3" fill="#131210"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#grain)"/>

  <!-- outer frame -->
  <rect x="72" y="72" width="1136" height="496" fill="none" stroke="#504A3F" stroke-width="1"/>

  <!-- masthead row -->
  <text x="110" y="120"
    font-family="IBM Plex Mono, ui-monospace, Menlo, monospace"
    font-size="14" letter-spacing="3" fill="#8A857A">SIR · VOL I · NO 1</text>
  <text x="1170" y="120" text-anchor="end"
    font-family="IBM Plex Mono, ui-monospace, Menlo, monospace"
    font-size="14" letter-spacing="3" fill="#8A857A">APRIL · MMXXVI</text>
  <line x1="110" y1="135" x2="1170" y2="135" stroke="#504A3F" stroke-width="1"/>

  <!-- reverse brackets mark — centered upper area -->
  <g transform="translate(560, 155)" stroke="#F3EEE2" stroke-width="3" fill="none" stroke-linecap="square">
    <path d="M 30 15 L 10 15 L 10 95 L 30 95"/>
    <path d="M 130 15 L 150 15 L 150 95 L 130 95"/>
  </g>
  <!-- verdict triad -->
  <circle cx="620" cy="220" r="6" fill="#4FAF58"/>
  <circle cx="640" cy="220" r="6" fill="#E29028"/>
  <circle cx="660" cy="220" r="6" fill="#E24A44"/>

  <!-- title -->
  <text x="640" y="355" text-anchor="middle"
    font-family="IBM Plex Serif, Georgia, serif"
    font-style="italic" font-weight="500"
    font-size="120" fill="#F3EEE2" letter-spacing="-2">sir</text>

  <!-- subtitle -->
  <text x="640" y="405" text-anchor="middle"
    font-family="IBM Plex Mono, ui-monospace, Menlo, monospace"
    font-size="16" letter-spacing="8" fill="#B8B2A4">SANDBOX IN REVERSE</text>

  <!-- rule -->
  <line x1="540" y1="435" x2="740" y2="435" stroke="#504A3F" stroke-width="1"/>

  <!-- tagline -->
  <text x="640" y="477" text-anchor="middle"
    font-family="IBM Plex Serif, Georgia, serif"
    font-style="italic" font-size="22" fill="#DDD5C0">Quiet on normal coding. Loud on dangerous transitions.</text>

  <!-- footer -->
  <text x="110" y="540"
    font-family="IBM Plex Mono, ui-monospace, Menlo, monospace"
    font-size="12" letter-spacing="2" fill="#504A3F">GITHUB.COM/SOMOORE/SIR</text>
  <text x="1170" y="540" text-anchor="end"
    font-family="IBM Plex Mono, ui-monospace, Menlo, monospace"
    font-size="12" letter-spacing="2" fill="#504A3F">APACHE · 2.0</text>
</svg>
